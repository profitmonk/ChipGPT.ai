<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChipGPT — RTL/DV Co-worker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/coworker/style.css" />
</head>
<body>
 <div class="stage-wrap">
  <div id="stage">
    <header class="topbar">
      <div class="brand">
        <svg class="chip" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M9 1v4M15 1v4M9 19v4M15 19v4M1 9h4M1 15h4M19 9h4M19 15h4"/></svg>
        <span class="word">Chip<span class="g">GPT</span></span>
        <span class="pill">RTL/DV Co-worker</span>
      </div>
      <div class="controls">
        <select id="bugSelect" title="Hero bug" aria-label="Hero bug"></select>
        <button id="liveBtn" title="Toggle live-captured trace">⚡ Live</button>
        <button id="playBtn" class="primary">▶ Play</button>
        <button id="restartBtn" title="Restart (R)">⟲</button>
        <label class="speed">speed
          <select id="speedSelect" aria-label="Speed">
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
            <option value="100">skip</option>
          </select>
        </label>
      </div>
    </header>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <section class="hook"><span id="hook"></span><span class="proof" id="proof"></span></section>

    <main class="panels">
      <div class="panel" id="specPanel">
        <div class="panel-head"><span class="tag spec">SPEC</span><span id="specTitle"></span></div>
        <div class="code" id="specCode"></div>
      </div>

      <div class="panel" id="rtlPanel">
        <div class="panel-head"><span class="tag rtl">RTL</span><span id="rtlTitle"></span><span class="badge" id="bugBadge">● BUG FOUND</span></div>
        <div class="code" id="rtlCode"></div>
      </div>

      <div class="panel" id="agentPanel">
        <div class="panel-head"><span class="tag agent">AGENT</span><span>reasoning</span><span class="tok" id="tokNote"></span></div>
        <div class="transcript" id="transcript"></div>
      </div>
    </main>

    <section class="artifacts">
      <div class="artifact-rail" id="artifactRail"></div>
    </section>

    <footer class="statusbar">
      <span id="srcLink"></span>
      <span class="site">chipgpt.ai</span>
    </footer>

    <!-- Landing: brand + the three hero bugs as a picker -->
    <div class="intro" id="intro">
      <div class="landing">
        <div class="intro-brand">
          <svg class="chip" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M9 1v4M15 1v4M9 19v4M15 19v4M1 9h4M1 15h4M19 9h4M19 15h4"/></svg>
          Chip<span class="g">GPT</span>
        </div>
        <p class="tagline">An AI co-worker that finds real RTL bugs — and proves each one the right way.</p>
        <div class="bug-cards" id="bugCards"></div>
        <div class="intro-foot">chipgpt.ai · RTL/DV verification co-worker</div>
      </div>
    </div>
  </div>
 </div>

  <script src="/coworker/app.js"></script>
</body>
</html>
